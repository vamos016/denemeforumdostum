<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Forum</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>
<div class="layout">
<aside class="sidebar">
<div class="logo">VForum</div>
<div class="menu">
<a href="forum.html">🏠 Ana Sayfa</a>
<a href="new-topic.html">➕ Konu Aç</a>
<a href="profile.html">👤 Profil</a>
<a href="messages.html">💬 Mesajlar</a>
<a href="admin.html">🛡️ Admin</a>
<button onclick="logout()">🚪 Çıkış Yap</button>
</div>
</aside>

<main class="main">
<div class="topbar">
<h2>Forum Konuları</h2>
<a class="btn" style="width:auto;padding:11px 18px" href="new-topic.html">Yeni Konu Aç</a>
</div>

<div class="card">
<input id="search" placeholder="Konu ara..." oninput="loadTopics()">
</div>

<div id="topics"></div>
</main>

<aside class="rightbar">
<div class="card profile-box">
<h3>Hesap</h3>
<p id="userEmail">Yükleniyor...</p>
</div>
<div class="card">
<h3>Trendler</h3>
<p class="meta">🔥 Popüler konular burada görünür.</p>
<p class="meta">🏆 Rozet sistemi aktif.</p>
<p class="meta">💬 Mesajlaşma hazır.</p>
</div>
</aside>
</div>

<script>
let currentUser=null;

async function checkUser(){
const {data:{user}}=await supabaseClient.auth.getUser();
if(!user){location.href="login.html";return;}
currentUser=user;
userEmail.innerText=user.email;
loadTopics();
}

async function loadTopics(){
const keyword=document.getElementById("search")?.value?.toLowerCase()||"";
const {data,error}=await supabaseClient
.from("topics")
.select("*")
.order("created_at",{ascending:false});

if(error){topics.innerHTML="<div class='card'>"+error.message+"</div>";return;}

let list=data||[];
if(keyword){
list=list.filter(t=>t.title.toLowerCase().includes(keyword)||t.content.toLowerCase().includes(keyword));
}

topics.innerHTML=list.map(t=>`
<div class="card topic" onclick="location.href='topic.html?id=${t.id}'">
<span class="badge">${t.solved?'Çözüldü':'Konu'}</span>
${t.pinned?'<span class="badge">Sabit</span>':''}
<h3>${escapeHtml(t.title)}</h3>
<p>${escapeHtml(t.content).slice(0,160)}...</p>
<div class="meta">👍 ${t.likes||0} 👎 ${t.dislikes||0} 👁️ ${t.views||0}</div>
</div>
`).join("") || "<div class='card'>Henüz konu yok. İlk konuyu sen aç.</div>";
}

async function logout(){
await supabaseClient.auth.signOut();
location.href="index.html";
}

function escapeHtml(text){
return String(text||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

checkUser();
</script>
</body>
</html>
