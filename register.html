<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kayıt Ol - VForum</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#1e293b;
padding:30px;
border-radius:15px;
width:350px;
}
input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}
button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
<h2>Kayıt Ol</h2>

<input id="email" type="email" placeholder="E-posta">
<input id="password" type="password" placeholder="Şifre">

<button onclick="register()">Kayıt Ol</button>

<p id="sonuc"></p>
</div>

<script>
async function register(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } =
await supabaseClient.auth.signUp({
email,
password
});

if(error){
document.getElementById("sonuc").innerText =
error.message;
}else{
document.getElementById("sonuc").innerText =
"Kayıt başarılı!";
}
}
</script>

</body>
</html>
