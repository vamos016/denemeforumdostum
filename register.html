<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kayıt Ol</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body class="auth-body">
<div class="auth-card">
<h2>Kayıt Ol</h2>
<input id="username" placeholder="Kullanıcı adı">
<input id="email" type="email" placeholder="E-posta">
<input id="password" type="password" placeholder="Şifre">
<button class="btn" onclick="register()">Kayıt Ol</button>
<p id="result"></p>
<a href="login.html">Zaten hesabın var mı? Giriş yap</a>
</div>

<script>
async function register(){
const username=document.getElementById("username").value.trim();
const email=document.getElementById("email").value.trim();
const password=document.getElementById("password").value;

if(!username||!email||!password){
result.innerText="Tüm alanları doldur.";
return;
}

const {data,error}=await supabaseClient.auth.signUp({email,password});

if(error){
result.innerText=error.message;
return;
}

const user=data.user;
if(user){
await supabaseClient.from("profiles").insert({
id:user.id,
username,
bio:"Yeni VForum üyesi",
level:1,
xp:0,
badges:["Yeni Üye"]
});
}

result.innerText="Kayıt başarılı. Giriş sayfasına yönlendiriliyorsun...";
setTimeout(()=>location.href="login.html",1200);
}
</script>
</body>
</html>
