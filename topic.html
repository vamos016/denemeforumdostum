<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Konu - Zeronix</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
</head>
<body>

<div id="locked" style="display:none">
<div class="auth-body">
<div class="auth-card">
<img src="logo.png" class="auth-logo">
<div class="logo" style="text-align:center">ZERONIX</div>
<div class="logo-sub" style="text-align:center">PRIVATE THREAD</div>
<h2>Bu konu üyelere özel</h2>
<p>Konu başlığını görebilirsin fakat içeriği okumak için giriş yapmalısın.</p>
<a class="btn" href="login.html">Giriş Yap</a>
<a class="btn" href="register.html" style="background:#1f2937;box-shadow:none">Kayıt Ol</a>
<a href="index.html" style="display:block;text-align:center;margin-top:15px;color:#ff6b88">Ana sayfaya dön</a>
</div>
</div>
</div>

<div id="memberArea" style="display:none">
<div class="layout">

<aside class="sidebar">
<div class="logo">ZERONIX</div>
<div class="logo-sub">THREAD // MEMBER</div>

<div class="menu">
<a href="index.html">🌐 Genel Ana Sayfa</a>
<a href="forum.html">🏠 Üye Paneli</a>
<a href="new-topic.html">➕ Konu Aç</a>
<a href="profile.html">👤 Profil</a>
<button onclick="logout()">🚪 Çıkış Yap</button>
</div>
</aside>

<main class="main">
<div id="topicBox"><div class="card">Yükleniyor...</div></div>

<div class="card">
<h3>💬 Cevap Yaz</h3>
<textarea id="commentText" placeholder="Yanıtını yaz..."></textarea>
<div class="actions">
<button class="btn" onclick="addComment()">Gönder</button>
<button class="btn" style="background:#1f2937;box-shadow:none" onclick="insertCode()">Kod Bloğu</button>
</div>
<p id="result" class="meta"></p>
</div>

<h2 style="margin:18px 0">Yorumlar</h2>
<div id="comments"></div>
</main>

<aside class="rightbar">
<div class="card">
<h3>⚡ Konu Araçları</h3>
<button class="btn" onclick="likeTopic('like')">👍 Beğen</button>
<button class="btn" onclick="likeTopic('dislike')" style="margin-top:8px;background:#1f2937;box-shadow:none">👎 Beğenme</button>
<button class="btn" onclick="quoteTopic()" style="margin-top:8px;background:#7f1d1d">💬 Alıntıla</button>
</div>
</aside>

</div>
</div>

<script>
const params=new URLSearchParams(location.search);
const topicId=params.get("id");
let currentUser=null;
let currentTopic=null;

async function init(){
const {data:{user}}=await supabaseClient.auth.getUser();

if(!user){
document.getElementById("locked").style.display="block";
return;
}

currentUser=user;
document.getElementById("memberArea").style.display="block";

await loadTopic();
await loadComments();
}

async function loadTopic(){
const {data,error}=await supabaseClient
.from("topics")
.select("*")
.eq("id",topicId)
.single();

if(error || !data){
topicBox.innerHTML="<div class='card'>Konu bulunamadı.</div>";
return;
}

currentTopic=data;

await supabaseClient
.from("topics")
.update({views:(data.views||0)+1})
.eq("id",topicId);

topicBox.innerHTML=`
<section class="hero">
<span class="badge">${data.solved ? "✅ Çözüldü" : "💬 Aktif Konu"}</span>
${data.pinned ? '<span class="badge gold">📌 Sabit</span>' : ""}
<h1 style="margin-top:12px">${escapeHtml(data.title)}</h1>
<div class="terminal">&gt; thread.id=${data.id}</div>
</section>

<div class="card">
<div class="topic-content">${formatContent(data.content)}</div>
<div class="meta">👁️ ${data.views||0} görüntülenme • ${new Date(data.created_at).toLocaleString("tr-TR")}</div>
</div>
`;
}

async function loadComments(){
const {data,error}=await supabaseClient
.from("comments")
.select("*")
.eq("topic_id",topicId)
.order("created_at",{ascending:true});

if(error){
comments.innerHTML="<div class='card'>"+escapeHtml(error.message)+"</div>";
return;
}

comments.innerHTML=(data||[]).map(c=>`
<div class="card comment">
<p style="white-space:pre-wrap">${formatContent(c.content)}</p>
<div class="meta">${new Date(c.created_at).toLocaleString("tr-TR")}</div>
</div>
`).join("") || "<div class='card empty'>Henüz yorum yok.</div>";
}

async function addComment(){
const content=commentText.value.trim();
if(!content){result.innerText="Yorum boş olamaz.";return;}

const {error}=await supabaseClient.from("comments").insert({
topic_id:topicId,
user_id:currentUser.id,
content
});

if(error){result.innerText=error.message;return;}

commentText.value="";
result.innerText="Yorum gönderildi.";
loadComments();
}

async function likeTopic(type){
if(!currentTopic)return;
const field=type==="like" ? "likes" : "dislikes";
const value=(currentTopic[field]||0)+1;

await supabaseClient
.from("topics")
.update({[field]:value})
.eq("id",topicId);

loadTopic();
}

function quoteTopic(){
commentText.value=`> ${currentTopic.title}\n\n`;
commentText.focus();
}

function insertCode(){
commentText.value += "\n```js\n// kodunu buraya yaz\n```\n";
commentText.focus();
}

async function logout(){
await supabaseClient.auth.signOut();
location.href="index.html";
}

function escapeHtml(text){
return String(text||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]));
}

function formatContent(text){
let safe=escapeHtml(text);
safe=safe.replace(/```([\s\S]*?)```/g,"<pre><code>$1</code></pre>");
safe=safe.replace(/\n/g,"<br>");
return safe;
}

init();
</script>

</body>
</html>
